version: 2
before:
  hooks:
    - go mod tidy
    - go test ./...
builds:
  - id: jigyll
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarm:
      - "5"
      - "6"
      - "7"
    goamd64:
      - "v1"
      - "v2"
      - "v3"
    goarch:
      - "amd64"
      - "arm64"
      - "arm"
      - "riscv64"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: riscv64
    ldflags: -s -w -X github.com/reidransom/jigyll/version.Version={{.Version}} -X github.com/reidransom/jigyll/version.BuildDate={{ time "2006-01-02T15:04:05-0700" }}

archives:
  - id: default
    ids:
      - jigyll
    formats:
      - tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Amd64 }}{{ .Amd64 }}{{ end }}
    # use zip for windows archives
    format_overrides:
    - goos: windows
      formats:
        - zip
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
brews:
  - name: jigyll
    ids:
      - default
    repository:
      owner: reidransom
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/reidransom/jigyll"
    description: "Go clone of the Jekyll static site generator"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # dart-sass provides the `sass` binary that jigyll resolves from PATH for SCSS.
    dependencies:
      - name: dart-sass
    install: |
      bin.install "jigyll"
    test: |
      system "#{bin}/jigyll", "version"
