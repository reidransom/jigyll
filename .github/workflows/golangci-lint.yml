name: golangci-lint
on: [push, pull_request]
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2 is required to lint code targeting Go 1.25;
          # the v1 line (last v1.64.8) is built with go1.24 and rejects it.
          version: v2.6.2
          args: --timeout=30m --issues-exit-code=1
